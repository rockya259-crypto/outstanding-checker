<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Panel</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
:root{--bg:#0f172a;--card:#1e293b;--accent:#f59e0b;--accent2:#fbbf24;--text:#f1f5f9;--muted:#94a3b8;--border:#334155;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Poppins',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:10px;}
.hdr{text-align:center;margin:10px 0 16px;}
.hdr h1{font-size:1.4rem;font-weight:800;color:var(--accent);}
.hdr p{color:var(--muted);font-size:0.76rem;margin-top:3px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;width:100%;max-width:680px;}
input[type=password],input[type=text]{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:0.93rem;font-family:inherit;outline:none;box-sizing:border-box;margin-top:8px;}
input:focus{border-color:var(--accent);}
.btn{display:block;width:100%;padding:11px;background:var(--accent);color:#000;border:none;border-radius:10px;font-weight:700;font-size:0.93rem;cursor:pointer;font-family:inherit;margin-top:10px;}
.btn:hover{background:var(--accent2);}
.inn{display:none;}
/* Counter bar */
.cbar{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 16px;margin-bottom:12px;width:100%;max-width:680px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.cinfo{font-size:0.82rem;}
.cred{color:#fca5a5;font-weight:700;font-size:1rem;}
.cgrn{color:#6ee7b7;font-weight:700;font-size:1rem;}
.cbtn{background:#1e293b;color:#94a3b8;border:1px solid #334155;font-size:0.76rem;padding:6px 10px;border-radius:8px;cursor:pointer;font-family:inherit;}
.cbtn:hover{background:#334155;color:#f1f5f9;}
.cbtn-pdf{background:#7c3aed;color:#e9d5ff;border-color:#7c3aed;}
.cbtn-pdf:hover{background:#6d28d9;}
/* Search */
.srch{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:0.87rem;font-family:inherit;outline:none;box-sizing:border-box;margin-top:0;}
/* Party rows */
.plist{margin-top:10px;max-height:520px;overflow-y:auto;}
.prow{display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border);gap:8px;border-left:4px solid #ef4444;transition:all 0.3s;}
.prow.done{border-left-color:#10b981;opacity:0.6;}
.prow:nth-child(odd){background:#1e293b;}
.prow:nth-child(even){background:#162032;}
.pi{flex:1;min-width:0;}
.pn{font-size:0.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pm{font-size:0.69rem;color:var(--muted);}
.pt{font-size:0.68rem;color:#10b981;margin-top:1px;}
.pa{font-size:0.82rem;font-weight:700;color:#fbbf24;white-space:nowrap;margin-right:6px;min-width:70px;text-align:right;}
a.wb{background:#25d366;border-radius:8px;padding:6px 9px;font-size:0.73rem;font-weight:700;color:#fff;text-decoration:none;white-space:nowrap;flex-shrink:0;}
a.wb:hover{background:#128c7e;}
.wno{background:#334155;color:#94a3b8;border-radius:8px;padding:6px 9px;font-size:0.73rem;font-weight:700;white-space:nowrap;flex-shrink:0;}
.sbadge{background:#064e3b;color:#6ee7b7;border-radius:8px;padding:6px 9px;font-size:0.73rem;font-weight:700;white-space:nowrap;flex-shrink:0;}
.slabel{font-size:0.73rem;font-weight:700;padding:5px 12px;}
.sl-p{background:#7f1d1d;color:#fca5a5;}
.sl-s{background:#064e3b;color:#6ee7b7;}
.lupd{text-align:center;font-size:0.73rem;color:var(--muted);padding:7px;background:var(--card);border-radius:8px;border:1px solid var(--border);width:100%;max-width:680px;margin-bottom:10px;}
.lupd span{color:var(--accent);font-weight:600;}
.err{color:#fca5a5;font-size:0.82rem;margin-top:8px;display:none;}
@media(max-width:500px){body{padding:8px;}.hdr h1{font-size:1.2rem;}.prow{flex-wrap:wrap;}}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:999;align-items:center;justify-content:center;padding:12px;}
.modal.show{display:flex;}
.mbox{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
.mbox h3{font-size:0.95rem;font-weight:700;color:var(--accent);margin-bottom:10px;}
textarea{width:100%;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:0.84rem;font-family:inherit;outline:none;box-sizing:border-box;min-height:190px;resize:vertical;}
.hint{font-size:0.73rem;color:var(--muted);margin-top:8px;padding:9px;background:var(--bg);border-radius:8px;line-height:1.7;}
.hint b{color:var(--accent);}
</style>
</head>

    <div style="display:flex;gap:6px;flex-wrap:wrap;">
      <button class="cbtn" style="background:#0e7490;color:#a5f3fc;border-color:#0e7490" onclick="openME()">&#x270F; Message</button>

  <div class="card" style="padding:10px;">
    <input type="text" class="srch" id="sq" placeholder="&#x1F50D; Party naam se search..." oninput="fl()" />
    <div class="plist" id="pl"></div>
  </div>
</div>

var SD = "24-1-2083";
var PW = "STAFF2026";
var SN = {};
var LG = [];
var SN_KEY = "staff_sent";

function checkReset(){
  try{
    var saved = localStorage.getItem(SN_KEY);
    if(saved){var p=JSON.parse(saved);SN=p.sn||{};LG=p.lg||[];}
  }catch(e){}
}

function saveState(){
  try{ localStorage.setItem(SN_KEY, JSON.stringify({sn:SN,lg:LG})); }catch(e){}
}

function fmt(n){return n?parseFloat(n).toLocaleString("en-IN",{minimumFractionDigits:2,maximumFractionDigits:2}):"0";}

function lg(){
  var p = document.getElementById("spw").value;
  if(p === PW){
    document.getElementById("serr").style.display="none";
    document.getElementById("lcard").style.display="none";
    document.getElementById("inn").style.display="block";
    checkReset();
    updCnt();
    rl("");
  } else {
    document.getElementById("serr").style.display="block";
  }
}

function lo(){
  if(!confirm("Logout?"))return;
  document.getElementById("inn").style.display="none";
  document.getElementById("lcard").style.display="block";
  document.getElementById("spw").value="";
}

function manRst(){
  if(!confirm("Manually reset karein? Saare sent marks hatenge."))return;
  SN={};LG=[];
  try{localStorage.removeItem(SN_KEY);}catch(e){}
  updCnt();
  rl(document.getElementById("sq").value);
}

function ms(nm){
  var nw = new Date();
  var t = nw.getDate()+"/"+(nw.getMonth()+1)+" "+nw.getHours().toString().padStart(2,"0")+":"+nw.getMinutes().toString().padStart(2,"0");
  SN[nm]=t;
  LG.push({n:nm,t:t,a:D[nm]?D[nm].total_pending:0});
  saveState();
  updCnt();
  setTimeout(function(){rl(document.getElementById("sq").value);},600);
}

function updCnt(){
  var total = Object.keys(D).length;
  var sent = Object.keys(SN).length;
  document.getElementById("pcnt").textContent = total - sent;
  document.getElementById("scnt").textContent = sent;
}

function fl(){rl(document.getElementById("sq").value);}

function rl(q){
  var c = document.getElementById("pl");
  q = (q||"").toLowerCase().trim();
  var all = Object.entries(D).filter(function(e){return !q||e[0].toLowerCase().indexOf(q)>=0;});
  var pd = all.filter(function(e){return !SN[e[0]];}).sort(function(a,b){return b[1].total_pending-a[1].total_pending;});
  var st = all.filter(function(e){return !!SN[e[0]];}).sort(function(a,b){return b[1].total_pending-a[1].total_pending;});
  var h = "";

  if(pd.length){
    h += '<div class="slabel sl-p">&#x1F534; Pending - '+pd.length+' parties</div>';
    pd.forEach(function(e){
      var nm=e[0],inf=e[1];
      var hm=inf.mobile&&inf.mobile.toString().length>=6;
      var wa="";
      if(hm){
        var mb=inf.mobile.toString().replace(/\D/g,"");
        var ln="";
        inf.bills.forEach(function(b){if(b.pending_amt>0)ln+="- "+b.type+(b.bill_no?" "+b.bill_no:"")+" | Rs."+fmt(b.pending_amt)+" | "+b.days+" days\n";});
        getM();var mg=MT.replace(/{naam}/g,nm).replace(/{amount}/g,fmt(inf.total_pending)).replace(/{bills}/g,ln);
        var sn=nm.replace(/\\/g,"\\\\").replace(/'/g,"\\'");
        var ur="https://wa.me/"+mb+"?text="+encodeURIComponent(mg);
        wa='<a class="wb" href="'+ur+'" target="_blank" onclick="setTimeout(function(){ms(\''+sn+'\')},600)">&#x1F4AC; Send</a>';
      }else{
        wa='<span class="wno">No Mobile</span>';
      }
      h+='<div class="prow"><div class="pi"><div class="pn">'+nm+'</div><div class="pm">'+(inf.mobile||"-")+'</div></div><div class="pa">Rs.'+fmt(inf.total_pending)+'</div>'+wa+'</div>';
    });
  }

  if(st.length){
    h += '<div class="slabel sl-s">&#x1F7E2; Bheja - '+st.length+' parties</div>';
    st.forEach(function(e){
      var nm=e[0],inf=e[1];
      h+='<div class="prow done"><div class="pi"><div class="pn">'+nm+'</div><div class="pt">&#x2705; '+SN[nm]+'</div></div><div class="pa">Rs.'+fmt(inf.total_pending)+'</div><span class="sbadge">&#x2714; Sent</span></div>';
    });
  }

  if(!h)h='<div style="text-align:center;color:var(--muted);padding:20px">Koi party nahi mili</div>';
  c.innerHTML=h;
}
